<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄家湖二手闲置微信群</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 黄家湖二手闲置微信群</h1>
            <p class="subtitle">选择您的学校，获取最新闲置交易群二维码</p>
        </header>

        <div class="schools-grid">
            <div class="school-card" data-school="wust">
                <div class="school-icon">🏫</div>
                <h2>武汉科技大学</h2>
                <p>武科大闲置交易群</p>
            </div>

            <div class="school-card" data-school="hubei-tcm">
                <div class="school-icon">🌿</div>
                <h2>湖北中医药大学</h2>
                <p>湖中医闲置交易群</p>
            </div>

            <div class="school-card" data-school="whgsu">
                <div class="school-icon">📚</div>
                <h2>武汉工商学院</h2>
                <p>武工商闲置交易群</p>
            </div>

            <div class="school-card" data-school="whjtu">
                <div class="school-icon">🚄</div>
                <h2>武汉交通职业学院</h2>
                <p>武交院闲置交易群</p>
            </div>
        </div>

        <!-- 二维码弹窗 -->
        <div id="qrModal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2 id="modalTitle"></h2>
                <div class="qr-container">
                    <img id="qrImage" src="" alt="微信群二维码">
                </div>
                <p class="notice">⚠️ 若二维码失效请联系管理员更新</p>
                <p class="last-update">最后更新时间：<span id="lastUpdate"></span></p>
            </div>
        </div>

        <footer>
            <p>💡 提示：微信群二维码有效期为7天，若失效请联系管理员更新，微信：hszt214</p>
            
            <p>© 2026 黄家湖二手闲置</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
